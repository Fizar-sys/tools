<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fizar Genie — Kalkulator Ciepła</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --bg2: #181c27;
    --bg3: #1e2333;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #e8eaf0;
    --text2: #8a90a4;
    --text3: #555c72;
    --accent: #4f8ef7;
    --accent2: #2d5fc4;
    --green: #3ecf8e;
    --green-bg: rgba(62,207,142,0.08);
    --amber: #f5a623;
    --amber-bg: rgba(245,166,35,0.08);
    --red: #f76464;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.05em;
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .header-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.08em;
  }

  main { max-width: 1100px; margin: 0 auto; padding: 40px 32px; }

  .page-title {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 28px;
    font-weight: 300;
    color: var(--text);
    margin-bottom: 32px;
    letter-spacing: -0.02em;
  }

  h1 span { color: var(--accent); font-weight: 500; }

  /* Drop zone */
  .dropzone {
    border: 1.5px dashed var(--border2);
    border-radius: 12px;
    padding: 48px 32px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg2);
    margin-bottom: 32px;
    position: relative;
  }

  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--accent);
    background: rgba(79,142,247,0.04);
  }

  .dropzone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }

  .drop-icon {
    width: 48px; height: 48px;
    margin: 0 auto 16px;
    background: var(--bg3);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }

  .drop-title { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
  .drop-sub { font-size: 13px; color: var(--text2); }

  /* Status */
  .status-bar {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 24px;
    font-size: 13px;
    color: var(--text2);
  }

  .status-bar.show { display: flex; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results */
  #results { display: none; }
  #results.show { display: block; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .results-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .period-badge {
    font-family: var(--mono);
    font-size: 12px;
    padding: 4px 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text2);
  }

  .buildings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .bld-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    transition: border-color 0.2s;
  }

  .bld-card:hover { border-color: var(--border2); }

  .bld-name {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }

  .bld-meta { font-size: 11px; color: var(--text3); margin-bottom: 14px; }

  .erp-fields { display: flex; flex-direction: column; gap: 8px; }

  .erp-field-row { }

  .field-label {
    font-size: 10px;
    color: var(--text3);
    font-family: var(--mono);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .field-value {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 500;
    color: var(--green);
    background: var(--green-bg);
    border: 1px solid rgba(62,207,142,0.15);
    border-radius: 6px;
    padding: 7px 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: all 0.15s;
    user-select: all;
  }

  .field-value:hover {
    background: rgba(62,207,142,0.14);
    border-color: rgba(62,207,142,0.3);
  }

  .field-value.copied {
    background: rgba(62,207,142,0.2);
    color: #fff;
  }

  .copy-hint {
    font-size: 10px;
    color: rgba(62,207,142,0.5);
    font-weight: 400;
  }

  .field-unit { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }

  /* Breakdown toggle */
  .breakdown-toggle {
    margin-top: 12px;
    font-size: 11px;
    color: var(--text3);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    border: none;
    background: none;
    padding: 0;
    font-family: var(--sans);
  }

  .breakdown-toggle:hover { color: var(--text2); }

  .breakdown-body {
    display: none;
    margin-top: 10px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }

  .breakdown-body.open { display: block; }

  .bd-section { font-size: 10px; color: var(--text3); font-family: var(--mono); letter-spacing: 0.08em; text-transform: uppercase; margin: 8px 0 4px; }

  .bd-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text2);
    padding: 2px 0;
  }

  .bd-total {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    font-weight: 500;
    color: var(--text);
    border-top: 1px solid var(--border);
    margin-top: 3px;
    padding-top: 3px;
  }

  /* Summary bar */
  .summary-bar {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
  }

  .sum-item { }
  .sum-label { font-size: 10px; color: var(--text3); font-family: var(--mono); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 3px; }
  .sum-val { font-size: 14px; font-weight: 500; color: var(--text); font-family: var(--mono); }

  /* Error */
  .error-box {
    display: none;
    background: rgba(247,100,100,0.06);
    border: 1px solid rgba(247,100,100,0.2);
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 13px;
    color: var(--red);
    margin-bottom: 20px;
  }

  .error-box.show { display: block; }

  /* Reset btn */
  .reset-btn {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text3);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .reset-btn:hover { color: var(--text2); border-color: var(--border2); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    FIZAR GENIE
  </div>
  <div class="header-tag">ZIELON · Kalkulator Mediów</div>
</header>

<main>
  <div class="page-title">Moduł kosztów</div>
  <h1>Kalkulator <span>Ciepła</span></h1>

  <div class="dropzone" id="dropzone">
    <input type="file" accept=".pdf" id="fileInput" />
    <div class="drop-icon">📄</div>
    <div class="drop-title">Wgraj fakturę PGE (PDF)</div>
    <div class="drop-sub">Przeciągnij plik lub kliknij aby wybrać · obsługiwane: PDF</div>
  </div>

  <div class="status-bar" id="statusBar">
    <div class="spinner"></div>
    <span id="statusText">Analizuję fakturę…</span>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div id="results">
    <div class="results-header">
      <div class="results-title">Wyniki · gotowe do ERP</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div class="period-badge" id="periodBadge">—</div>
        <button class="reset-btn" onclick="resetAll()">↺ Nowy plik</button>
      </div>
    </div>
    <div class="buildings-grid" id="buildingsGrid"></div>
    <div class="summary-bar" id="summaryBar"></div>
  </div>
</main>

<script>
const SYSTEM_PROMPT = `Jesteś ekspertem od polskich faktur za ciepło sieciowe PGE Zielona Góra S.A.

Analizujesz faktury i wyciągasz dane do systemu ERP Fizar Sp. z o.o. dla obiektu przy ul. Zjednoczenia 106, Zielona Góra.

BUDYNKI (identyfikacja po zamówionej mocy MW):
- CWWI  → 0,30 MW
- CWWII → 0,3068 MW  
- CWWIII → 0,17 MW
- CWWO → 0,05 MW

ZASADY KLASYFIKACJI POZYCJI:
- ZMIENNA = wszystkie pozycje z jednostką GJ + pozycje z jednostką m³ (nośnik ciepła)
- STAŁA = wszystkie pozycje z jednostką MW + pozycje z jednostką szt (dzierżawa licznika, opłata za załącznik)

OBLICZENIA:
- Cena zmienna [PLN/GJ] = suma wartości netto pozycji ZMIENNYCH / ilość GJ (z pozycji GJ)
- Stała [PLN] = suma wartości netto pozycji STAŁYCH
- UWAGA: dzierżawa licznika ciepła (szt) z odrębnej faktury należy do CWWII

Zwróć WYŁĄCZNIE JSON bez żadnego tekstu przed ani po, w formacie:
{
  "okres": "miesiąc rok np. Luty 2026",
  "budynki": [
    {
      "nazwa": "CWWI",
      "gj": 140.79,
      "cena_zmienna": 143.42765821,
      "stala": 5589.07,
      "zm_pozycje": [
        {"nazwa": "Ciepło (CO) · GJ", "netto": 15019.48},
        {"nazwa": "Opłata zmienna przesyłowa · GJ", "netto": 5154.32},
        {"nazwa": "Nośnik ciepła 0,31 m³", "netto": 19.38}
      ],
      "st_pozycje": [
        {"nazwa": "Zamówiona moc cieplna (0,30 MW)", "netto": 3502.69},
        {"nazwa": "Opłata stała przesyłowa (0,30 MW)", "netto": 2086.38}
      ]
    }
  ]
}
Kolejność budynków: CWWI, CWWII, CWWIII, CWWO.
Wartość cena_zmienna podaj z dokładnością 8 miejsc po przecinku.`;

async function analyzeInvoice(base64Data) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 2000,
      system: SYSTEM_PROMPT,
      messages: [{
        role: "user",
        content: [
          {
            type: "document",
            source: { type: "base64", media_type: "application/pdf", data: base64Data }
          },
          { type: "text", text: "Przeanalizuj załączone faktury i zwróć JSON z wynikami dla wszystkich budynków." }
        ]
      }]
    })
  });
  return await response.json();
}

function fmtPLN(v) { return Number(v).toLocaleString('pl-PL', {minimumFractionDigits:2}) + ' zł'; }
function fmt8(v) { return Number(v).toFixed(8).replace('.', ','); }

function copyValue(el, rawVal) {
  const copyStr = String(rawVal).replace(',', '.');
  navigator.clipboard.writeText(copyStr).then(() => {
    const orig = el.innerHTML;
    el.classList.add('copied');
    el.innerHTML = `✓ skopiowano <span class="copy-hint">Ctrl+V w ERP</span>`;
    setTimeout(() => { el.classList.remove('copied'); el.innerHTML = orig; }, 1500);
  });
}

function toggleBreakdown(btn, bodyId) {
  const body = document.getElementById(bodyId);
  body.classList.toggle('open');
  btn.textContent = body.classList.contains('open') ? '▲ ukryj szczegóły' : '▼ pokaż szczegóły';
}

function renderResults(data) {
  document.getElementById('periodBadge').textContent = data.okres || '—';

  const grid = document.getElementById('buildingsGrid');
  grid.innerHTML = '';

  let totalZm = 0, totalSt = 0, totalGJ = 0;

  (data.budynki || []).forEach((b, i) => {
    totalGJ += Number(b.gj);
    const zm = (b.zm_pozycje || []).reduce((s, r) => s + Number(r.netto), 0);
    const st = (b.st_pozycje || []).reduce((s, r) => s + Number(r.netto), 0);
    totalZm += zm; totalSt += st;

    const bdId = `bd-${i}`;
    const zmFmt = fmt8(b.cena_zmienna);
    const stFmt = fmt8(b.stala);

    const card = document.createElement('div');
    card.className = 'bld-card';
    card.innerHTML = `
      <div class="bld-name">${b.nazwa}</div>
      <div class="bld-meta">${b.gj} GJ · ${data.okres}</div>
      <div class="erp-fields">
        <div class="erp-field-row">
          <div class="field-label">Cena ciepło (zmienna)</div>
          <div class="field-value" onclick="copyValue(this, '${zmFmt}')">
            ${zmFmt}
            <span class="copy-hint">kopiuj</span>
          </div>
          <div class="field-unit">PLN/GJ netto</div>
        </div>
        <div class="erp-field-row">
          <div class="field-label">Stała ciepło</div>
          <div class="field-value" onclick="copyValue(this, '${stFmt}')">
            ${stFmt}
            <span class="copy-hint">kopiuj</span>
          </div>
          <div class="field-unit">PLN netto/mc</div>
        </div>
      </div>
      <button class="breakdown-toggle" onclick="toggleBreakdown(this, '${bdId}')">▼ pokaż szczegóły</button>
      <div class="breakdown-body" id="${bdId}">
        <div class="bd-section">Zmienna (GJ + m³)</div>
        ${(b.zm_pozycje || []).map(r => `<div class="bd-row"><span>${r.nazwa}</span><span>${fmtPLN(r.netto)}</span></div>`).join('')}
        <div class="bd-total"><span>Suma ÷ ${b.gj} GJ</span><span>${fmtPLN(zm)}</span></div>
        <div class="bd-section">Stała (MW + szt)</div>
        ${(b.st_pozycje || []).map(r => `<div class="bd-row"><span>${r.nazwa}</span><span>${fmtPLN(r.netto)}</span></div>`).join('')}
        <div class="bd-total"><span>Razem stała</span><span>${fmtPLN(st)}</span></div>
      </div>`;
    grid.appendChild(card);
  });

  document.getElementById('summaryBar').innerHTML = `
    <div class="sum-item"><div class="sum-label">Łącznie zmienna netto</div><div class="sum-val">${fmtPLN(totalZm)}</div></div>
    <div class="sum-item"><div class="sum-label">Łącznie stała netto</div><div class="sum-val">${fmtPLN(totalSt)}</div></div>
    <div class="sum-item"><div class="sum-label">Łączne GJ</div><div class="sum-val">${totalGJ.toFixed(2)}</div></div>
    <div class="sum-item"><div class="sum-label">Łącznie netto</div><div class="sum-val">${fmtPLN(totalZm + totalSt)}</div></div>`;

  document.getElementById('results').classList.add('show');
}

function setStatus(text) {
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusBar').classList.add('show');
}

function hideStatus() {
  document.getElementById('statusBar').classList.remove('show');
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.classList.add('show');
}

function resetAll() {
  document.getElementById('results').classList.remove('show');
  document.getElementById('errorBox').classList.remove('show');
  hideStatus();
  document.getElementById('fileInput').value = '';
  document.getElementById('dropzone').style.display = 'block';
}

async function handleFile(file) {
  if (!file || file.type !== 'application/pdf') {
    showError('Proszę wybrać plik PDF z fakturą PGE.');
    return;
  }

  document.getElementById('dropzone').style.display = 'none';
  document.getElementById('errorBox').classList.remove('show');
  setStatus(`Wczytuję: ${file.name}…`);

  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result.split(',')[1];
    setStatus('Analizuję faktury — Claude czyta pozycje i oblicza wartości…');
    try {
      const response = await analyzeInvoice(base64);
      const textBlock = response.content?.find(b => b.type === 'text');
      if (!textBlock) throw new Error('Brak odpowiedzi od Claude.');

      let clean = textBlock.text.replace(/```json|```/g, '').trim();
      const data = JSON.parse(clean);
      hideStatus();
      renderResults(data);
    } catch (err) {
      hideStatus();
      document.getElementById('dropzone').style.display = 'block';
      showError('Błąd analizy: ' + err.message);
    }
  };
  reader.readAsDataURL(file);
}

const dz = document.getElementById('dropzone');
const fi = document.getElementById('fileInput');

fi.addEventListener('change', e => handleFile(e.target.files[0]));

dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  handleFile(e.dataTransfer.files[0]);
});
</script>
</body>
</html>
