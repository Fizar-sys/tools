<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fizar — Naklejki QR | Licznniki</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg:#0f1117; --surface:#181c27; --surface2:#1e2435;
    --border:#2a3148; --accent:#3b82f6; --text:#e2e8f0; --muted:#64748b;
    --heat:#ef4444; --water:#06b6d4; --elec:#f59e0b;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'IBM Plex Sans',sans-serif; font-size:14px; }

  header {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:18px 32px; display:flex; align-items:center; gap:16px;
  }
  .logo { font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:18px; color:var(--accent); }
  .logo span { color:var(--muted); font-weight:400; }

  main { max-width:1200px; margin:0 auto; padding:32px 24px; }

  .toolbar {
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    padding:16px 20px; margin-bottom:24px;
    display:flex; align-items:center; gap:20px; flex-wrap:wrap;
  }
  .toolbar-title { font-size:15px; font-weight:500; }
  .count { font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600;
    padding:3px 10px; border-radius:20px; background:rgba(59,130,246,.12); color:var(--accent); }

  .sep { width:1px; height:24px; background:var(--border); }

  .filter-group { display:flex; gap:6px; align-items:center; }
  .filter-label { font-size:11px; color:var(--muted); margin-right:2px; }
  .fb {
    padding:5px 12px; border-radius:20px; font-size:11px; font-weight:600;
    font-family:'IBM Plex Mono',monospace; cursor:pointer;
    border:1px solid var(--border); background:var(--surface2); color:var(--muted);
    transition:all .15s;
  }
  .fb:hover { color:var(--text); }
  .fb.on-all   { background:rgba(59,130,246,.15); color:var(--accent);  border-color:var(--accent); }
  .fb.on-c     { background:rgba(239,68,68,.15);  color:var(--heat);   border-color:var(--heat); }
  .fb.on-w     { background:rgba(6,182,212,.15);  color:var(--water);  border-color:var(--water); }
  .fb.on-p     { background:rgba(245,158,11,.15); color:var(--elec);   border-color:var(--elec); }
  .fb.on-O     { background:rgba(139,92,246,.15); color:#a78bfa;       border-color:#a78bfa; }
  .fb.on-R     { background:rgba(34,197,94,.15);  color:#22c55e;       border-color:#22c55e; }
  .fb.on-g     { background:rgba(34,197,94,.15);  color:#22c55e;       border-color:#22c55e; }
  .fb.on-prop  { background:rgba(59,130,246,.25); color:#fff;          border-color:var(--accent); font-weight:700; }

  .btn-upload {
    padding:8px 18px; background:var(--surface2); color:var(--muted);
    border:1px dashed var(--border); border-radius:7px; font-size:12px;
    font-weight:600; cursor:pointer; font-family:'IBM Plex Sans',sans-serif;
    transition:all .2s; display:flex; align-items:center; gap:8px;
    white-space:nowrap;
  }
  .btn-upload:hover { color:var(--text); border-color:var(--accent); }
  .btn-upload.loaded { border-color:#22c55e; color:#22c55e; border-style:solid; }
  .btn-upload.error  { border-color:#ef4444; color:#ef4444; border-style:solid; }
  #fileInput { display:none; }

  .btn-print {
    margin-left:auto; padding:10px 24px; background:var(--accent); color:#fff;
    border:none; border-radius:7px; font-size:13px; font-weight:600;
    cursor:pointer; font-family:'IBM Plex Sans',sans-serif; transition:background .2s;
    display:flex; align-items:center; gap:8px;
  }
  .btn-print:hover { background:#1d4ed8; }

  /* ── Preview grid ── */
  #grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(170px,1fr));
    gap:10px;
  }
  .card {
    background:#fff; color:#111; border-radius:10px; padding:8px;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    border:1.5px solid #e5e7eb; cursor:default; width:100%;
    box-shadow:0 1px 4px rgba(0,0,0,.06);
  }
  .card canvas { width:88px!important; height:88px!important; display:block; }
  .c-toprow {
    display:flex; justify-content:space-between; align-items:center;
    width:100%; padding:0 1px;
  }
  .c-util { font-size:8px; font-weight:700; letter-spacing:.6px; text-transform:uppercase;
    padding:2px 7px; border-radius:3px; }
  .c-util.C { background:#fee2e2; color:#991b1b; }
  .c-util.W { background:#cffafe; color:#0e7490; }
  .c-util.P { background:#fef3c7; color:#92400e; }
  .c-util.G { background:#dcfce7; color:#166534; }
  .c-bldg  { font-size:8px; color:#999; text-transform:uppercase; letter-spacing:.6px; font-weight:500; }
  .c-name  { font-size:11px; font-weight:700; color:#000; text-align:center; line-height:1.3; margin-top:2px; }
  .c-loc   { font-size:8px; color:#aaa; text-align:center; }
  .c-shared{ font-size:8px; color:#bbb; }

  #empty { display:none; text-align:center; padding:60px; color:var(--muted); }

  /* ── Print ── */
  @media print {
    @page { size: A4 landscape; margin: 8mm; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    body { background: #fff !important; }
    header, .toolbar, #empty, #psheet { display: none !important; }
    main { padding: 0 !important; max-width: none !important; margin: 0 !important; }
    #grid {
      display: grid !important;
      grid-template-columns: repeat(6, 1fr) !important;
      gap: 3mm !important;
    }
    .card {
      border: 0.4px solid #ccc !important;
      border-radius: 2mm !important;
      padding: 1.5mm !important;
      gap: 0.8mm !important;
      break-inside: avoid !important;
      background: #fff !important;
    }
    .card canvas { width: 19mm !important; height: 19mm !important; }
    .c-toprow { width: 100% !important; }
    .c-util   { font-size: 5.5pt !important; padding: 1px 4px !important; }
    .c-bldg   { font-size: 5pt   !important; }
    .c-name   { font-size: 8.5pt !important; font-weight: 700 !important; margin-top:0.5mm !important; }
    .c-loc    { font-size: 5.5pt !important; color: #aaa !important; }
    .c-shared { font-size: 5pt   !important; color: #bbb !important; }
  }
  #psheet { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo">FIZAR<span>.qr</span></div>
  <div style="width:1px;height:24px;background:var(--border)"></div>
  <span style="font-size:13px;color:var(--muted)" id="headerDesc">Generator Naklejek QR — Liczniki</span>
</header>

<main>
  <div class="toolbar">
    <span class="toolbar-title">Nieruchomość:</span>
    <div class="filter-group">
      <button class="fb on-all" id="fp-GRUDZ"  onclick="fp('GRUDZ')">GRUDZ</button>
      <button class="fb"         id="fp-MALBO"  onclick="fp('MALBO')">MALBO</button>
      <button class="fb"         id="fp-ZIELON" onclick="fp('ZIELON')">ZIELON</button>
    </div>
    <div class="sep"></div>
    <span class="toolbar-title">Liczniki</span>
    <span class="count" id="cnt"></span>
    <div class="sep"></div>
    <div class="filter-group">
      <span class="filter-label">Media:</span>
      <button class="fb on-all" id="fu-all"  onclick="fu('all')">Wszystkie</button>
      <button class="fb" id="fu-C" onclick="fu('C')">🔴 Ciepło</button>
      <button class="fb" id="fu-W" onclick="fu('W')">🔵 Woda</button>
      <button class="fb" id="fu-P" onclick="fu('P')">🟡 Prąd</button>
      <button class="fb" id="fu-G" onclick="fu('G')" style="display:none">🟢 Gaz</button>
    </div>
    <div class="sep"></div>
    <div class="filter-group">
      <span class="filter-label">Budynek:</span>
      <button class="fb on-all" id="fb-all" onclick="fb('all')">Oba</button>
      <button class="fb" id="fb-O" onclick="fb('O')">Biurowy</button>
      <button class="fb" id="fb-R" onclick="fb('R')">Handlowy</button>
    </div>
    <div class="sep"></div>
    <button class="btn-upload" id="btnUpload" onclick="document.getElementById('fileInput').click()">
      📂 Wczytaj Excel
    </button>
    <input type="file" id="fileInput" accept=".xlsx,.xlsm,.xlsb"
           onchange="loadExcel(this)">

    <button class="btn-print" onclick="doPrint()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
        <rect x="6" y="14" width="12" height="8"/>
      </svg>
      Drukuj naklejki
    </button>
  </div>

  <div id="grid"></div>
  <div id="empty">Brak liczników dla wybranego filtra.</div>
</main>

<div id="psheet"></div>

let currentProperty = 'GRUDZ';
let METERS = [];

// ── Assign meter arrays after declarations ────────────────────────────────
PROPERTY_CONFIG.GRUDZ.meters  = METERS_GRUDZ;
PROPERTY_CONFIG.MALBO.meters  = METERS_MALBO;

METERS = METERS_GRUDZ;

function fp(prop) {
  currentProperty = prop;
  METERS = PROPERTY_CONFIG[prop].meters;
  // Update property buttons — use on-prop for active
  document.querySelectorAll('[id^="fp-"]').forEach(b => b.className = 'fb');
  document.getElementById('fp-' + prop).className = 'fb on-prop';
  // Show/hide Gas button
  const gasBtn = document.getElementById('fu-G');
  gasBtn.style.display = PROPERTY_CONFIG[prop].hasGas ? '' : 'none';
  // Reset utility filter to 'all'
  fU = 'all';
  document.querySelectorAll('[id^="fu-"]').forEach(b => b.className = 'fb');
  document.getElementById('fu-all').className = 'fb on-all';
  // Reset building filter to 'all'
  fB = 'all';
  document.querySelectorAll('[id^="fb-"]').forEach(b => b.className = 'fb');
  document.getElementById('fb-all').className = 'fb on-all';
  // Update header
  document.getElementById('headerDesc').textContent =
    'Generator Naklejek QR — ' + PROPERTY_CONFIG[prop].name;
  renderGrid();
}

const BLDG_LABEL = {O:'Biurowy', R:'Handlowy', X:'Wspólny'};

let fU = 'all', fB = 'all';

function filtered() {
  return METERS.filter(m =>
    (fU==='all' || m.u===fU) &&
    (fB==='all' || m.bld===fB)
  );
}

// Filter button helpers
function fu(v) {
  fU = v;
  ['all','C','W','P','G'].forEach(k => {
    const btn = document.getElementById('fu-'+k);
    if (!btn) return;
    const activeClass = v === 'all' ? 'on-all' :
                        v === 'C'   ? 'on-c'   :
                        v === 'W'   ? 'on-w'   :
                        v === 'P'   ? 'on-p'   :
                        v === 'G'   ? 'on-g'   : 'on-all';
    btn.className = 'fb' + (k === v ? ' ' + activeClass : '');
  });
  renderGrid();
}
function fb(v) {
  fB = v;
  ['all','O','R'].forEach(k => {
    const btn = document.getElementById('fb-'+k);
    if (!btn) return;
    const activeClass = v === 'all' ? 'on-all' : 'on-' + v;
    btn.className = 'fb' + (k === v ? ' ' + activeClass : '');
  });
  renderGrid();
}
window.fu = fu; window.fb = fb; window.fp = fp;

// ── Sticker HTML helper ──
function stickerContent(m, forPrint) {
  const bldg  = BLDG_LABEL[m.bld] || m.bld;
  const floor = m.fl !== null ? `P${m.fl}` : null;
  const prem  = m.pr || null;
  const loc   = [floor, prem].filter(Boolean).join(' · ');
  const util  = m.u==='C'?'Ciepło':m.u==='W'?'Woda':'Prąd';

  return `
    <div class="c-toprow">
      <span class="c-bldg">${bldg}</span>
      <span class="c-util ${m.u}">${util}</span>
    </div>
    <div class="qr-target" style="width:72px;height:72px"></div>
    <span class="c-name">${m.name}</span>
    ${loc ? `<span class="c-loc">${loc}</span>` : `<span class="c-shared">wspólny</span>`}
  `;
}

function makeQR(id, size) {
  // Use qrcode-generator library: qr(typeNumber, errorCorrectionLevel)
  const qr = qrcode(0, 'M');
  qr.addData(id);
  qr.make();
  // Draw to canvas manually
  const canvas = document.createElement('canvas');
  const moduleCount = qr.getModuleCount();
  const cellSize = Math.floor(size / moduleCount);
  const margin = Math.floor(cellSize * 0.5);
  canvas.width  = moduleCount * cellSize + margin * 2;
  canvas.height = moduleCount * cellSize + margin * 2;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#000000';
  for (let row = 0; row < moduleCount; row++) {
    for (let col = 0; col < moduleCount; col++) {
      if (qr.isDark(row, col)) {
        ctx.fillRect(margin + col * cellSize, margin + row * cellSize, cellSize, cellSize);
      }
    }
  }
  return canvas;
}

async function renderQR(container, id, size) {
  try {
    const canvas = makeQR(id, size);
    canvas.style.width  = size + 'px';
    canvas.style.height = size + 'px';
    container.appendChild(canvas);
  } catch(e) { console.warn('QR error', id, e); }
}

async function renderGrid() {
  const list = filtered();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  document.getElementById('cnt').textContent = list.length;

  if (!list.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = '';

  for (const m of list) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = stickerContent(m);
    grid.appendChild(card);
    const container = card.querySelector('.qr-target');
    await renderQR(container, m.id, 88);
  }
}

async function doPrint() {
  const list = filtered();
  if (!list.length) return;

  const btn = document.querySelector('.btn-print');
  btn.disabled = true;
  btn.innerHTML = '⏳ Przygotowuję...';

  // Ensure all QR codes are rendered in the current grid
  // (they already are from renderGrid, but just in case filter changed)
  await new Promise(r => setTimeout(r, 200));
  window.print();

  btn.disabled = false;
  btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> Drukuj naklejki`;
}
window.doPrint = doPrint;

// ── Excel loader ─────────────────────────────────────────────────────────
// Sheet configs per property — how to read meter IDs
const EXCEL_CONFIG = {
  GRUDZ: {
    sheets: [
      {name:'Cieplo', idCol:4, u:'C'},  // col E (0-indexed = 4)
      {name:'Woda',   idCol:4, u:'W'},
      {name:'Prad',   idCol:4, u:'P'},
    ],
    bldCol: 0,   // col A
    nameCol: 5,  // col F
    numCol:  6,  // col G
    flCol:   2,  // col C
    prCol:   3,  // col D
    dataRow: 2,  // data starts at row index 2 (row 3 in Excel)
  },
  MALBO: {
    sheets: [
      {name:'Odczyty', idCol:3, u:null},  // col D; utility auto-detected from ID
    ],
    bldCol:  0,
    nameCol: 4,
    numCol:  5,
    flCol:   null,
    prCol:   1,
    dataRow: 2,
  },
  ZIELON: {
    sheets: [
      {name:'Cieplo',       idCol:4, u:'C'},
      {name:'Prad',         idCol:4, u:'P'},
      {name:'Woda',         idCol:4, u:'W'},
    ],
    bldCol:  0,
    nameCol: 5,
    numCol:  6,
    flCol:   null,
    prCol:   null,
    dataRow: 2,
  },
};

function detectUtility(id) {
  if (!id) return 'P';
  if (id.includes('_G_')) return 'G';
  if (id.includes('_W_')) return 'W';
  if (id.includes('_C_')) return 'C';
  return 'P';
}

function normalizeBld(raw) {
  const s = String(raw || '').trim();
  if (s === 'Biurowy') return 'O';
  if (s === 'Handlowy' || s === 'CH Unia-Park') return 'R';
  if (s === '') return 'R';  // GRUDZ empty = Handlowy
  return s;  // ZIELON: CWW1, CWW2, CWW3, Biurowiec, SP, Shell etc.
}

async function loadExcel(input) {
  const file = input.files[0];
  if (!file) return;

  const btn = document.getElementById('btnUpload');
  btn.textContent = '⏳ Wczytuję...';
  btn.className = 'btn-upload';

  try {
    const buf = await file.arrayBuffer();
    const wb  = XLSX.read(buf, {type:'array'});

    const prop   = currentProperty;
    const config = EXCEL_CONFIG[prop];
    if (!config) throw new Error('Brak konfiguracji dla: ' + prop);

    // Check required sheets exist
    for (const sc of config.sheets) {
      if (!wb.SheetNames.includes(sc.name)) {
        throw new Error(`Brak arkusza "${sc.name}" w pliku`);
      }
    }

    const newMeters = [];

    for (const sc of config.sheets) {
      const ws   = wb.Sheets[sc.name];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});

      for (let i = config.dataRow; i < rows.length; i++) {
        const row = rows[i];
        const mid = row[sc.idCol];
        if (!mid || !String(mid).startsWith('LICZ_')) continue;

        const u    = sc.u || detectUtility(String(mid));
        const bld  = config.bldCol  !== null ? normalizeBld(row[config.bldCol])  : 'R';
        const name = config.nameCol !== null ? String(row[config.nameCol] || '') : '';
        const num  = config.numCol  !== null ? String(row[config.numCol]  || '') : '';
        const fl   = config.flCol   !== null ? (row[config.flCol] !== null ? String(row[config.flCol]) : null) : null;
        const pr   = config.prCol   !== null ? (row[config.prCol] !== null ? String(row[config.prCol]) : null) : null;

        newMeters.push({id:String(mid), name, num, u, bld, fl, pr});
      }
    }

    if (!newMeters.length) throw new Error('Nie znaleziono licznikow w pliku');

    // Update the property meter list
    PROPERTY_CONFIG[prop].meters = newMeters;
    METERS = newMeters;

    // Show Gas button if needed
    const hasGas = newMeters.some(m => m.u === 'G');
    PROPERTY_CONFIG[prop].hasGas = hasGas;
    document.getElementById('fu-G').style.display = hasGas ? '' : 'none';

    btn.textContent = `✅ ${file.name} (${newMeters.length} liczników)`;
    btn.className = 'btn-upload loaded';

    // Reset filters and render
    fU = 'all'; fB = 'all';
    document.querySelectorAll('[id^="fu-"]').forEach(b => b.className = 'fb');
    document.getElementById('fu-all').className = 'fb on-all';
    document.querySelectorAll('[id^="fb-"]').forEach(b => b.className = 'fb');
    document.getElementById('fb-all').className = 'fb on-all';
    renderGrid();

  } catch(err) {
    btn.textContent = '❌ ' + err.message;
    btn.className = 'btn-upload error';
    console.error(err);
  }

  // Reset file input so same file can be re-loaded
  input.value = '';
}
window.loadExcel = loadExcel;
