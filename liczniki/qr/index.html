<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fizar — Naklejki QR | Grudziądz</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg:#0f1117; --surface:#181c27; --surface2:#1e2435;
    --border:#2a3148; --accent:#3b82f6; --text:#e2e8f0; --muted:#64748b;
    --heat:#ef4444; --water:#06b6d4; --elec:#f59e0b;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'IBM Plex Sans',sans-serif; font-size:14px; }

  header {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:18px 32px; display:flex; align-items:center; gap:16px;
  }
  .logo { font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:18px; color:var(--accent); }
  .logo span { color:var(--muted); font-weight:400; }

  main { max-width:1200px; margin:0 auto; padding:32px 24px; }

  .toolbar {
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
    padding:16px 20px; margin-bottom:24px;
    display:flex; align-items:center; gap:20px; flex-wrap:wrap;
  }
  .toolbar-title { font-size:15px; font-weight:500; }
  .count { font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600;
    padding:3px 10px; border-radius:20px; background:rgba(59,130,246,.12); color:var(--accent); }

  .sep { width:1px; height:24px; background:var(--border); }

  .filter-group { display:flex; gap:6px; align-items:center; }
  .filter-label { font-size:11px; color:var(--muted); margin-right:2px; }
  .fb {
    padding:5px 12px; border-radius:20px; font-size:11px; font-weight:600;
    font-family:'IBM Plex Mono',monospace; cursor:pointer;
    border:1px solid var(--border); background:var(--surface2); color:var(--muted);
    transition:all .15s;
  }
  .fb:hover { color:var(--text); }
  .fb.on-all   { background:rgba(59,130,246,.15); color:var(--accent);  border-color:var(--accent); }
  .fb.on-c     { background:rgba(239,68,68,.15);  color:var(--heat);   border-color:var(--heat); }
  .fb.on-w     { background:rgba(6,182,212,.15);  color:var(--water);  border-color:var(--water); }
  .fb.on-p     { background:rgba(245,158,11,.15); color:var(--elec);   border-color:var(--elec); }
  .fb.on-O     { background:rgba(139,92,246,.15); color:#a78bfa;       border-color:#a78bfa; }
  .fb.on-R     { background:rgba(34,197,94,.15);  color:#22c55e;       border-color:#22c55e; }

  .btn-print {
    margin-left:auto; padding:10px 24px; background:var(--accent); color:#fff;
    border:none; border-radius:7px; font-size:13px; font-weight:600;
    cursor:pointer; font-family:'IBM Plex Sans',sans-serif; transition:background .2s;
    display:flex; align-items:center; gap:8px;
  }
  .btn-print:hover { background:#1d4ed8; }

  /* ── Preview grid ── */
  #grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(170px,1fr));
    gap:10px;
  }
  .card {
    background:#fff; color:#111; border-radius:8px; padding:10px 8px;
    display:flex; flex-direction:column; align-items:center; gap:4px;
    border:2px solid transparent; cursor:default; width:100%;
  }
  .card canvas { width:72px!important; height:72px!important; display:block; }
  .c-toprow {
    display:flex; justify-content:space-between; align-items:center;
    width:100%; padding:0 2px;
  }
  .c-util { font-size:8px; font-weight:700; letter-spacing:.8px; text-transform:uppercase;
    padding:2px 6px; border-radius:2px; }
  .c-util.C { background:#fee2e2; color:#991b1b; }
  .c-util.W { background:#cffafe; color:#0e7490; }
  .c-util.P { background:#fef3c7; color:#92400e; }
  .c-bldg  { font-size:8px; color:#777; text-transform:uppercase; letter-spacing:.5px; }
  .c-name  { font-size:11px; font-weight:700; color:#000; text-align:center; line-height:1.3; }
  .c-loc   { font-size:9px; color:#666; text-align:center; }
  .c-shared{ font-size:9px; color:#999; }

  #empty { display:none; text-align:center; padding:60px; color:var(--muted); }

  /* ── Print ── */
  @media print {
    @page { size: A4 landscape; margin: 8mm; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    body { background: #fff !important; }
    header, .toolbar, #empty, #psheet { display: none !important; }
    main { padding: 0 !important; max-width: none !important; margin: 0 !important; }
    #grid {
      display: grid !important;
      grid-template-columns: repeat(5, 1fr) !important;
      gap: 3mm !important;
    }
    .card {
      border: 0.4px solid #ccc !important;
      border-radius: 2mm !important;
      padding: 1.5mm !important;
      gap: 0.8mm !important;
      break-inside: avoid !important;
      background: #fff !important;
    }
    .card canvas { width: 20mm !important; height: 20mm !important; }
    .c-toprow { width: 100% !important; }
    .c-util   { font-size: 5.5pt !important; }
    .c-bldg   { font-size: 5pt   !important; }
    .c-name   { font-size: 8pt   !important; font-weight: 700 !important; }
    .c-loc    { font-size: 6pt   !important; color: #666 !important; }
    .c-shared { font-size: 5.5pt !important; }
  }
  #psheet { display: none; }
</style>
</head>

  fB = v;
  ['all','O','R'].forEach(k => {
    const btn = document.getElementById('fb-'+k);
    btn.className = 'fb' + (k===v ? ' on-'+v : '');
  });
  renderGrid();
}
window.fu = fu; window.fb = fb;

// ── Sticker HTML helper ──
function stickerContent(m, forPrint) {
  const bldg  = BLDG_LABEL[m.bld] || m.bld;
  const floor = m.fl !== null ? `P${m.fl}` : null;
  const prem  = m.pr || null;
  const loc   = [floor, prem].filter(Boolean).join(' · ');
  const util  = m.u==='C'?'Ciepło':m.u==='W'?'Woda':'Prąd';

  return `
    <div class="c-toprow">
      <span class="c-bldg">${bldg}</span>
      <span class="c-util ${m.u}">${util}</span>
    </div>
    <div class="qr-target" style="width:72px;height:72px"></div>
    <span class="c-name">${m.name}</span>
    ${loc ? `<span class="c-loc">${loc}</span>` : `<span class="c-shared">wspólny</span>`}
  `;
}

function makeQR(id, size) {
  // Use qrcode-generator library: qr(typeNumber, errorCorrectionLevel)
  const qr = qrcode(0, 'M');
  qr.addData(id);
  qr.make();
  // Draw to canvas manually
  const canvas = document.createElement('canvas');
  const moduleCount = qr.getModuleCount();
  const cellSize = Math.floor(size / moduleCount);
  const margin = Math.floor(cellSize * 1);
  canvas.width  = moduleCount * cellSize + margin * 2;
  canvas.height = moduleCount * cellSize + margin * 2;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#000000';
  for (let row = 0; row < moduleCount; row++) {
    for (let col = 0; col < moduleCount; col++) {
      if (qr.isDark(row, col)) {
        ctx.fillRect(margin + col * cellSize, margin + row * cellSize, cellSize, cellSize);
      }
    }
  }
  return canvas;
}

async function renderQR(container, id, size) {
  try {
    const canvas = makeQR(id, size);
    canvas.style.width  = size + 'px';
    canvas.style.height = size + 'px';
    container.appendChild(canvas);
  } catch(e) { console.warn('QR error', id, e); }
}

async function renderGrid() {
  const list = filtered();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  document.getElementById('cnt').textContent = list.length;

  if (!list.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = '';

  for (const m of list) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = stickerContent(m);
    grid.appendChild(card);
    const container = card.querySelector('.qr-target');
    await renderQR(container, m.id, 72);
  }
}

async function doPrint() {
  const list = filtered();
  if (!list.length) return;

  const btn = document.querySelector('.btn-print');
  btn.disabled = true;
  btn.innerHTML = '⏳ Przygotowuję...';

  // Ensure all QR codes are rendered in the current grid
  // (they already are from renderGrid, but just in case filter changed)
  await new Promise(r => setTimeout(r, 200));
  window.print();

  btn.disabled = false;
  btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> Drukuj naklejki`;
}
window.doPrint = doPrint;

// Init
document.addEventListener('DOMContentLoaded', renderGrid);
</script>
